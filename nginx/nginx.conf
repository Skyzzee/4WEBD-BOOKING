events {
  worker_connections 1024;
}

http {

  upstream auth_service {
    server auth-service:3001;
  }

  upstream user_service {
    server user-service:3002;
  }

  upstream event_service {
    server event-service:3003;
  }

  upstream ticket_service {
    server ticket-service:3004;
  }

  upstream payment_service {
    server payment-service:3005;
  }

  server {
    listen 8080;

    location /api/auth/ {
      proxy_pass http://auth_service/;
    }

    location /api/users/ {
      proxy_pass http://user_service/;
    }

    location /api/events/ {
      proxy_pass http://event_service/;
    }

    location /api/tickets/ {
      proxy_pass http://ticket_service/;
    }

    location /api/payments/ {
      proxy_pass http://payment_service/;
    }
  }
}