openapi: 3.0.0
info:
  title: Event Service API
  version: 1.0.0
  description: Service de gestion des événements

servers:
  - url: http://localhost:8080/api/events

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateEventRequest:
      type: object
      required: [title, location, date, maxCapacity, price]
      properties:
        title:
          type: string
          example: Concert Rock
        description:
          type: string
          example: Un super concert
        location:
          type: string
          example: Paris
        date:
          type: string
          format: date-time
          example: 2026-06-01T20:00:00Z
        maxCapacity:
          type: integer
          example: 500
        price:
          type: integer
          description: Prix en centimes
          example: 2500

    UpdateEventRequest:
      type: object
      properties:
        title:
          type: string
          example: Concert Rock Updated
        description:
          type: string
          example: Un super concert mis à jour
        location:
          type: string
          example: Lyon
        date:
          type: string
          format: date-time
          example: 2026-06-01T20:00:00Z
        maxCapacity:
          type: integer
          example: 600
        price:
          type: integer
          example: 3000

    UpdateEventStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [DRAFT, PUBLISHED, CANCELLED, SOLD_OUT]
          example: PUBLISHED

paths:
  /:
    post:
      summary: Créer un événement
      tags: [Events]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: Événement créé avec succès
        "400":
          description: Données invalides
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès réservé aux admins et event creators

  /all:
    get:
      summary: Récupérer tous les événements publiés (utilisateur)
      tags: [Events]
      security:
        - bearerAuth: []
      parameters:
        - name: availableOnly
          in: query
          required: false
          schema:
            type: boolean
          description: Si true, retourne uniquement les événements avec du stock disponible
      responses:
        "200":
          description: Liste des événements
        "401":
          description: Token manquant ou invalide

  /ec/all:
    get:
      summary: Récupérer les événements de l'event creator connecté
      tags: [Events]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liste des événements de l'event creator
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès réservé aux event creators

  /adm/all:
    get:
      summary: Récupérer tous les événements (admin)
      tags: [Events]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liste de tous les événements
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès réservé aux admins

  /ec/{id}:
    get:
      summary: Récupérer un événement par ID (event creator)
      tags: [Events]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Événement récupéré avec succès
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès réservé aux event creators
        "404":
          description: Événement non trouvé

  /adm/{id}:
    get:
      summary: Récupérer un événement par ID (admin)
      tags: [Events]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Événement récupéré avec succès
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès réservé aux admins
        "404":
          description: Événement non trouvé

  /{id}:
    get:
      summary: Récupérer un événement par ID (utilisateur)
      tags: [Events]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Événement récupéré avec succès
        "401":
          description: Token manquant ou invalide
        "404":
          description: Événement non trouvé

    patch:
      summary: Mettre à jour un événement
      tags: [Events]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventRequest"
      responses:
        "200":
          description: Événement mis à jour avec succès
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès réservé aux admins et event creators
        "404":
          description: Événement non trouvé

    delete:
      summary: Supprimer un événement
      tags: [Events]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Événement supprimé avec succès
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès réservé aux admins et event creators
        "404":
          description: Événement non trouvé

  /{id}/status:
    patch:
      summary: Mettre à jour le statut d'un événement
      tags: [Events]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventStatusRequest"
      responses:
        "200":
          description: Statut mis à jour avec succès
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès réservé aux admins et event creators
        "404":
          description: Événement non trouvé
