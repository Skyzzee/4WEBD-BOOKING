services:
  # DATABASES
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - booking-network

  user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - booking-network

  event-db:
    image: postgres:16-alpine
    container_name: event-db
    environment:
      POSTGRES_USER: ${EVENT_DB_USER}
      POSTGRES_PASSWORD: ${EVENT_DB_PASSWORD}
      POSTGRES_DB: ${EVENT_DB_NAME}
    ports:
      - "5435:5432"
    volumes:
      - event_db_data:/var/lib/postgresql/data
    networks:
      - booking-network

  ticket-db:
    image: postgres:16-alpine
    container_name: ticket-db
    environment:
      POSTGRES_USER: ${TICKET_DB_USER}
      POSTGRES_PASSWORD: ${TICKET_DB_PASSWORD}
      POSTGRES_DB: ${TICKET_DB_NAME}
    ports:
      - "5436:5432"
    volumes:
      - ticket_db_data:/var/lib/postgresql/data
    networks:
      - booking-network

  payment-db:
    image: postgres:16-alpine
    container_name: payment-db
    environment:
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
      POSTGRES_DB: ${PAYMENT_DB_NAME}
    ports:
      - "5437:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    networks:
      - booking-network

  logger-db:
    image: postgres:16-alpine
    container_name: logger-db
    environment:
      POSTGRES_USER: ${LOGGER_DB_USER}
      POSTGRES_PASSWORD: ${LOGGER_DB_PASSWORD}
      POSTGRES_DB: ${LOGGER_DB_NAME}
    ports:
      - "5438:5432"
    volumes:
      - logger_db_data:/var/lib/postgresql/data
    networks:
      - booking-network

  # SERVICES
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      DATABASE_URL: postgresql://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@auth-db:5432/${AUTH_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      RABBITMQ_URL: ${RABBITMQ_URL}
      PORT: 3000
    depends_on:
      auth-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - booking-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      DATABASE_URL: postgresql://${USER_DB_USER}:${USER_DB_PASSWORD}@user-db:5432/${USER_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      RABBITMQ_URL: ${RABBITMQ_URL}
      PORT: 3000
    depends_on:
      user-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - booking-network

  event-service:
    build:
      context: ./event-service
      dockerfile: Dockerfile
    container_name: event-service
    environment:
      DATABASE_URL: postgresql://${EVENT_DB_USER}:${EVENT_DB_PASSWORD}@event-db:5432/${EVENT_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      RABBITMQ_URL: ${RABBITMQ_URL}
      PORT: 3000
    depends_on:
      event-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - booking-network

  ticket-service:
    build:
      context: ./ticket-service
      dockerfile: Dockerfile
    container_name: ticket-service
    environment:
      DATABASE_URL: postgresql://${TICKET_DB_USER}:${TICKET_DB_PASSWORD}@ticket-db:5432/${TICKET_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_QRCODE_SECRET: ${JWT_QRCODE_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      RABBITMQ_URL: ${RABBITMQ_URL}
      PORT: 3000
      EVENT_SERVICE_URL: http://event-service:3000
      PAYMENT_SERVICE_URL: http://payment-service:3000
    depends_on:
      ticket-db:
        condition: service_started
      event-service:
        condition: service_started
      payment-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - booking-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      DATABASE_URL: postgresql://${PAYMENT_DB_USER}:${PAYMENT_DB_PASSWORD}@payment-db:5432/${PAYMENT_DB_NAME}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      RABBITMQ_URL: ${RABBITMQ_URL}
      PORT: 3000
    depends_on:
      payment-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - booking-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      RABBITMQ_URL: ${RABBITMQ_URL}
      PORT: 3000
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - booking-network

  logger-service:
    build:
      context: ./logger-service
      dockerfile: Dockerfile
    container_name: logger-service
    environment:
      DATABASE_URL: postgresql://${LOGGER_DB_USER}:${LOGGER_DB_PASSWORD}@logger-db:5432/${LOGGER_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      RABBITMQ_URL: ${RABBITMQ_URL}
      PORT: 3000
    depends_on:
      logger-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - booking-network

  # NGINX
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - event-service
      - ticket-service
      - payment-service
    networks:
      - booking-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - booking-network
    healthcheck: # Need to wait for rabbitMQ to be ready to accept connexions
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# VOLUMES
volumes:
  auth_db_data:
  user_db_data:
  event_db_data:
  ticket_db_data:
  payment_db_data:
  logger_db_data:
  rabbitmq_data:

# NETWORKS
networks:
  booking-network:
    driver: bridge
