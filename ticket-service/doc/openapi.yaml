openapi: 3.0.0
info:
  title: Ticket Service API
  version: 1.0.0
  description: Service de gestion des billets

servers:
  - url: http://localhost:8080/api/tickets

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Ticket:
      type: object
      properties:
        id:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        paymentId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, CONFIRMED, CANCELLED, USED]
        qrCode:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        purchasedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BuyTicketRequest:
      type: object
      required: [eventId]
      properties:
        eventId:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000

paths:
  /:
    post:
      summary: Acheter un billet
      tags: [Tickets]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyTicketRequest"
      responses:
        "201":
          description: Billet acheté avec succès
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "400":
          description: Paiement échoué ou événement non disponible
        "401":
          description: Token manquant ou invalide
        "404":
          description: Événement non trouvé
        "409":
          description: Aucune place disponible

  /my:
    get:
      summary: Récupérer ses propres billets
      tags: [Tickets]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liste des billets de l'utilisateur connecté
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
        "401":
          description: Token manquant ou invalide

  /user/{userId}:
    get:
      summary: Récupérer les billets d'un utilisateur (admin)
      tags: [Tickets]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Liste des billets de l'utilisateur
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès réservé aux admins

  /event/{eventId}:
    get:
      summary: Récupérer les billets d'un événement
      tags: [Tickets]
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Liste des billets de l'événement
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès réservé aux admins et event creators

  /{id}:
    get:
      summary: Récupérer un billet par ID
      tags: [Tickets]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Billet récupéré avec succès
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès non autorisé
        "404":
          description: Billet non trouvé

  /{id}/validate:
    patch:
      summary: Valider un billet
      tags: [Tickets]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Billet validé avec succès
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "400":
          description: Billet non validable ou QR code invalide
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès réservé aux admins et event creators
        "404":
          description: Billet non trouvé
        "409":
          description: Billet déjà utilisé

  /{id}/cancel:
    patch:
      summary: Annuler un billet
      tags: [Tickets]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Billet annulé avec succès
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "400":
          description: Billet déjà utilisé
        "401":
          description: Token manquant ou invalide
        "403":
          description: Accès non autorisé
        "404":
          description: Billet non trouvé
        "409":
          description: Billet déjà annulé
